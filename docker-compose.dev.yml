services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${PORT:-5174}:5174"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_DOCKER=true
      - VITE_PROXY_TARGET=http://backend:3000
      - VITE_HMR_CLIENT_PORT=${PORT:-5174}
      - VITE_API_URL=/api
    networks:
      - orderly-network

networks:
  orderly-network:
    name: orderly-network
